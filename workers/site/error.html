<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySweetPea — Error</title>
    <link rel="icon" type="image/svg+xml" href="/logo-favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { max-width: 460px; width: 100%; text-align: center; }
        .logo svg { width: 48px; height: 48px; }
        .card {
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(231, 76, 60, 0.2);
            border-radius: 12px;
            padding: 36px;
            margin-top: 20px;
            backdrop-filter: blur(8px);
        }
        .error-icon { font-size: 2.2rem; margin-bottom: 14px; }
        .card h1 { font-size: 1.3rem; color: #e74c3c; margin-bottom: 10px; }
        .card p { font-size: 0.88rem; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .btn {
            display: inline-block;
            padding: 11px 28px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #e0e0e0;
            border-radius: 7px;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }
        .btn:hover { background: rgba(255, 255, 255, 0.12); border-color: rgba(212, 175, 55, 0.3); }
        .footer { margin-top: 18px; font-size: 0.78rem; color: #666; }
        .footer a { color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" stroke="#d4af37" stroke-width="2" fill="rgba(212,175,55,0.05)"/>
                <path d="M50 20 C35 25, 30 40, 35 55 C40 65, 50 70, 50 70 C50 70, 60 65, 65 55 C70 40, 65 25, 50 20" fill="#d4af37" opacity="0.8"/>
                <path d="M50 35 C45 38, 43 45, 46 52 C48 57, 50 60, 50 60 C50 60, 52 57, 54 52 C57 45, 55 38, 50 35" fill="#0a0a0a" opacity="0.6"/>
                <line x1="50" y1="70" x2="50" y2="85" stroke="#d4af37" stroke-width="2"/>
                <path d="M45 78 Q40 75, 38 80" stroke="#d4af37" stroke-width="1.5" fill="none"/>
                <path d="M55 78 Q60 75, 62 80" stroke="#d4af37" stroke-width="1.5" fill="none"/>
            </svg>
        </div>

        <div class="card">
            <div class="error-icon">&#x26A0;&#xFE0F;</div>
            <h1>Something Went Wrong</h1>
            <p id="errorMsg">We could not process your request. Please check your information and try again.</p>
            <a href="/form.html" class="btn">Back to Form</a>
        </div>

        <div class="footer">
            Need help? <a href="mailto:sweetpea@tuta.io">sweetpea@tuta.io</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reason = urlParams.get('reason');
        const errorMsg = document.getElementById('errorMsg');

        if (reason === 'validation') {
            errorMsg.textContent = 'Please check your inputs. Make sure your name, email, and username are valid.';
        } else if (reason === 'invalid_code') {
            errorMsg.textContent = 'Invalid or already used invite code. Please check your code and try again.';
        }
    </script>
</body>
</html>
